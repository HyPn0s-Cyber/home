<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 450'>
  <defs>
    <linearGradient id='bg' x1='0' x2='0' y1='0' y2='1'>
      <stop offset='0' stop-color='#0b1020'/>
      <stop offset='1' stop-color='#07090c'/>
    </linearGradient>
    <linearGradient id='neon' x1='0' x2='1' y1='0' y2='0'>
      <stop offset='0' stop-color='#22ff9c'/>
      <stop offset='1' stop-color='#b061ff'/>
    </linearGradient>
  </defs>
  <rect width='800' height='450' fill='url(#bg)'/>
  <!-- rain streaks -->
  <g stroke='#56d1ff' stroke-opacity='0.15' stroke-width='1'>
    <line x1='60'  y1='0' x2='40'  y2='450'/>
    <line x1='140' y1='0' x2='120' y2='450'/>
    <line x1='220' y1='0' x2='200' y2='450'/>
    <line x1='300' y1='0' x2='280' y2='450'/>
    <line x1='380' y1='0' x2='360' y2='450'/>
    <line x1='460' y1='0' x2='440' y2='450'/>
    <line x1='540' y1='0' x2='520' y2='450'/>
    <line x1='620' y1='0' x2='600' y2='450'/>
    <line x1='700' y1='0' x2='680' y2='450'/>
    <line x1='780' y1='0' x2='760' y2='450'/>
  </g>
  <!-- buildings -->
  <g fill='#0e1218' stroke='#1a222d'>
    <rect x='40'  y='120' width='140' height='260'/>
    <rect x='200' y='80'  width='160' height='300'/>
    <rect x='380' y='150' width='120' height='230'/>
    <rect x='520' y='60'  width='200' height='320'/>
  </g>
  <!-- windows -->
  <g fill='#22ff9c' fill-opacity='0.25'>
    <rect x='60'  y='140' width='14' height='14'/><rect x='90'  y='140' width='14' height='14'/><rect x='120' y='140' width='14' height='14'/>
    <rect x='60'  y='170' width='14' height='14'/><rect x='90'  y='170' width='14' height='14'/><rect x='120' y='170' width='14' height='14'/>
    <rect x='220' y='110' width='14' height='14'/><rect x='250' y='110' width='14' height='14'/><rect x='280' y='110' width='14' height='14'/><rect x='310' y='110' width='14' height='14'/>
    <rect x='220' y='140' width='14' height='14'/><rect x='250' y='140' width='14' height='14'/><rect x='280' y='140' width='14' height='14'/><rect x='310' y='140' width='14' height='14'/>
    <rect x='540' y='90'  width='14' height='14'/><rect x='570' y='90'  width='14' height='14'/><rect x='600' y='90'  width='14' height='14'/><rect x='630' y='90'  width='14' height='14'/><rect x='660' y='90'  width='14' height='14'/>
    <rect x='540' y='120' width='14' height='14'/><rect x='570' y='120' width='14' height='14'/><rect x='600' y='120' width='14' height='14'/><rect x='630' y='120' width='14' height='14'/><rect x='660' y='120' width='14' height='14'/>
  </g>
  <!-- vertical neon sign "Paris Baguette" -->
  <g transform='translate(380 240)'>
    <rect x='-8' y='-110' width='16' height='150' fill='#07090c' stroke='#22ff9c'/>
    <text x='0' y='-90' text-anchor='middle' font-family='monospace' font-size='12' fill='#22ff9c'>파</text>
    <text x='0' y='-70' text-anchor='middle' font-family='monospace' font-size='12' fill='#22ff9c'>리</text>
    <text x='0' y='-50' text-anchor='middle' font-family='monospace' font-size='12' fill='#22ff9c'>바</text>
    <text x='0' y='-30' text-anchor='middle' font-family='monospace' font-size='12' fill='#22ff9c'>게</text>
    <text x='0' y='-10' text-anchor='middle' font-family='monospace' font-size='12' fill='#22ff9c'>뜨</text>
  </g>
  <!-- map pin -->
  <g transform='translate(720 80)'>
    <circle r='18' fill='#ff5c7a' fill-opacity='0.15' stroke='#ff5c7a'/>
    <circle r='4' fill='#ff5c7a'/>
  </g>
  <!-- title -->
  <text x='40' y='420' font-family='monospace' font-size='22' fill='url(#neon)'>&gt; OSINT :: Seoul</text>
  <text x='40' y='40'  font-family='monospace' font-size='12' fill='#8a96a3'>DEADFACE{D-Cube_City}</text>
</svg>
